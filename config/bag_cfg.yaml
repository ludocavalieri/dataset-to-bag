# ==============================================================
#                    BAG CONFIGURATION
# ==============================================================
# --------------------------------------------------------------
# Choose bag name
# --------------------------------------------------------------
# Bag name can be undeclared, in which case the created bag will be named katwijk_bag
bag_name: katwijk-1

# --------------------------------------------------------------
# Path section to download
# --------------------------------------------------------------
# Make sure the part number and url match
dataset_url: "https://roboshare.esa.int/index.php/s/abDQEmi8Yjv9fhP/download"
part_nr: 1

# --------------------------------------------------------------
# Data to record
# --------------------------------------------------------------
# Select topics to publish
save_images: True    # Left and right LocCam images
save_imu: True       # IMU measurements
save_gt: False       # GPS-based trajectory reconstruction

# Image processing
compressed: True     # Publish images as CompressedImage messages, reduces data volume
rgb: True           # Save uncompressed images as RGB (rgb8) instead of BGR (bgr8); no effect when compressed is True

# --------------------------------------------------------------
# Clean dataset root
# --------------------------------------------------------------
# Remove extracted data
clean_root: False